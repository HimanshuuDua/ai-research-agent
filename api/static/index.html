<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Research Agent</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #070b14;
      --surface: rgba(15, 23, 42, 0.72);
      --surface-solid: #0f172a;
      --border: rgba(148, 163, 184, 0.14);
      --border-hover: rgba(148, 163, 184, 0.28);
      --text: #f8fafc;
      --muted: #94a3b8;
      --accent: #3b82f6;
      --accent-2: #8b5cf6;
      --accent-glow: rgba(59, 130, 246, 0.35);
      --success: #34d399;
      --error: #f87171;
      --user-bg: linear-gradient(135deg, rgba(59, 130, 246, 0.22), rgba(139, 92, 246, 0.18));
      --assistant-bg: rgba(30, 41, 59, 0.85);
      --radius: 14px;
      --shadow: 0 24px 48px rgba(0, 0, 0, 0.35);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    html, body { height: 100%; }

    body {
      font-family: "Inter", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow: hidden;
    }

    .bg-mesh {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
      pointer-events: none;
    }

    .bg-mesh::before,
    .bg-mesh::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.45;
      animation: drift 18s var(--ease) infinite alternate;
    }

    .bg-mesh::before {
      width: 520px;
      height: 520px;
      background: radial-gradient(circle, #2563eb 0%, transparent 70%);
      top: -120px;
      left: -80px;
    }

    .bg-mesh::after {
      width: 480px;
      height: 480px;
      background: radial-gradient(circle, #7c3aed 0%, transparent 70%);
      bottom: -100px;
      right: -60px;
      animation-delay: -6s;
    }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to { transform: translate(40px, 30px) scale(1.08); }
    }

    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      width: 100%;
      height: 100dvh;
      padding: 0.65rem 0.85rem;
      gap: 0.65rem;
      animation: fadeUp 0.7s var(--ease) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(16px); }
      to { opacity: 1; transform: translateY(0); }
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 1rem 1.25rem;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      animation: fadeUp 0.7s var(--ease) 0.05s both;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 0.85rem;
    }

    .logo {
      width: 42px;
      height: 42px;
      border-radius: 12px;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      display: grid;
      place-items: center;
      font-size: 1.2rem;
      box-shadow: 0 8px 24px var(--accent-glow);
      animation: pulseGlow 3s ease-in-out infinite;
    }

    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 8px 24px var(--accent-glow); }
      50% { box-shadow: 0 8px 32px rgba(139, 92, 246, 0.45); }
    }

    header h1 {
      font-size: 1.15rem;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header p {
      color: var(--muted);
      font-size: 0.82rem;
      margin-top: 0.15rem;
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.45rem;
      padding: 0.45rem 0.85rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 500;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.6);
      transition: all 0.3s var(--ease);
      white-space: nowrap;
    }

    .status-pill .dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      transition: background 0.3s;
    }

    .status-pill.ok .dot {
      background: var(--success);
      box-shadow: 0 0 10px rgba(52, 211, 153, 0.7);
      animation: blink 2s ease-in-out infinite;
    }

    .status-pill.error .dot { background: var(--error); }
    .status-pill.working .dot {
      background: var(--accent);
      animation: blink 0.9s ease-in-out infinite;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }

    .layout {
      flex: 1;
      display: grid;
      grid-template-columns: minmax(220px, 260px) minmax(0, 1fr);
      gap: 0.65rem;
      min-height: 0;
      width: 100%;
      animation: fadeUp 0.7s var(--ease) 0.1s both;
    }

    aside, main {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      backdrop-filter: blur(16px);
      box-shadow: var(--shadow);
      min-height: 0;
    }

    aside {
      padding: 0.85rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      overflow-y: auto;
    }

    .email-info {
      font-size: 0.75rem;
      color: var(--muted);
      line-height: 1.45;
      padding: 0.55rem 0.65rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: rgba(7, 11, 20, 0.45);
    }

    .email-info strong { color: #cbd5e1; font-weight: 500; }

    .panel-title {
      font-size: 0.72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 0.5rem;
    }

    select, .btn {
      width: 100%;
      padding: 0.7rem 0.85rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(7, 11, 20, 0.65);
      color: var(--text);
      font: inherit;
      font-size: 0.88rem;
      transition: border-color 0.25s, transform 0.25s var(--ease), box-shadow 0.25s;
    }

    select:focus, .btn:focus-visible {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.2);
    }

    .btn {
      cursor: pointer;
      text-align: left;
      position: relative;
      overflow: hidden;
    }

    .btn:hover {
      border-color: var(--border-hover);
      transform: translateY(-1px);
    }

    .btn:active { transform: translateY(0) scale(0.98); }

    .btn-example {
      margin-bottom: 0.4rem;
      display: flex;
      align-items: center;
      gap: 0.55rem;
    }

    .btn-example .icon {
      width: 18px;
      height: 18px;
      flex-shrink: 0;
      color: var(--accent);
    }

    .pipeline {
      display: flex;
      gap: 0.35rem;
      margin-top: 0.35rem;
    }

    .pipeline-step {
      flex: 1;
      height: 4px;
      border-radius: 99px;
      background: rgba(148, 163, 184, 0.15);
      transition: background 0.4s var(--ease), transform 0.4s var(--ease);
    }

    .pipeline-step.active {
      background: linear-gradient(90deg, var(--accent), var(--accent-2));
      transform: scaleY(1.3);
    }

    .btn-clear {
      margin-top: auto;
      text-align: center;
      color: var(--muted);
      border-style: dashed;
    }

    .btn-clear:hover { color: var(--text); }

    main {
      display: flex;
      flex-direction: column;
      min-height: 0;
      flex: 1;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 0.85rem 1rem;
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      scroll-behavior: smooth;
    }

    .empty-state {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      max-width: 420px;
      margin: 0 auto;
      color: var(--muted);
      animation: fadeUp 0.8s var(--ease) 0.2s both;
      padding: 1rem;
    }

    .empty-state .orb {
      width: 64px;
      height: 64px;
      margin: 0 auto 1rem;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: radial-gradient(circle at 30% 30%, rgba(59,130,246,0.3), transparent);
      animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }

    .empty-state h2 {
      font-size: 1rem;
      color: var(--text);
      margin-bottom: 0.4rem;
    }

    .empty-state p { font-size: 0.88rem; line-height: 1.5; }

    .message-row {
      display: flex;
      gap: 0.55rem;
      max-width: min(780px, 96%);
      animation: msgIn 0.45s var(--ease) both;
    }

    @keyframes msgIn {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .message-row.user { align-self: flex-end; flex-direction: row-reverse; }
    .message-row.assistant { align-self: flex-start; }
    .message-row.system { align-self: center; max-width: 100%; }

    .avatar {
      width: 30px;
      height: 30px;
      border-radius: 8px;
      flex-shrink: 0;
      display: grid;
      place-items: center;
      border: 1px solid var(--border);
      background: rgba(15, 23, 42, 0.8);
      color: #94a3b8;
    }

    .avatar svg { width: 16px; height: 16px; }

    .message-row.user .avatar {
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      border: none;
      color: white;
    }

    .message-row.assistant .avatar {
      color: #93c5fd;
    }

    .bubble {
      padding: 0.85rem 1rem;
      border-radius: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      font-size: 0.92rem;
    }

    .message-row.user .bubble {
      background: var(--user-bg);
      border: 1px solid rgba(59, 130, 246, 0.25);
      border-top-right-radius: 4px;
    }

    .message-row.assistant .bubble {
      background: var(--assistant-bg);
      border: 1px solid var(--border);
      border-top-left-radius: 4px;
    }

    .message-row.system .bubble {
      background: transparent;
      border: 1px dashed rgba(248, 113, 113, 0.35);
      color: #fca5a5;
      font-size: 0.85rem;
      padding: 0.65rem 0.85rem;
    }

    .meta {
      font-size: 0.72rem;
      color: var(--muted);
      margin-top: 0.45rem;
      font-family: "JetBrains Mono", monospace;
    }

    .steps { margin-top: 0.65rem; display: flex; flex-direction: column; gap: 0.4rem; }

    details.step {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: rgba(7, 11, 20, 0.5);
      overflow: hidden;
      transition: border-color 0.25s;
    }

    details.step[open] { border-color: rgba(59, 130, 246, 0.35); }

    details.step summary {
      cursor: pointer;
      padding: 0.55rem 0.75rem;
      font-size: 0.8rem;
      color: var(--muted);
      list-style: none;
      display: flex;
      align-items: center;
      gap: 0.5rem;
      transition: color 0.2s;
    }

    details.step summary::-webkit-details-marker { display: none; }

    details.step summary .tool-icon {
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      color: var(--accent);
    }

    details.step summary .chevron {
      margin-left: auto;
      transition: transform 0.3s var(--ease);
    }

    details.step[open] summary .chevron { transform: rotate(90deg); }

    details.step pre {
      padding: 0.65rem 0.75rem 0.75rem;
      border-top: 1px solid var(--border);
      font-family: "JetBrains Mono", monospace;
      font-size: 0.72rem;
      color: #cbd5e1;
      overflow-x: auto;
      line-height: 1.45;
      animation: fadeUp 0.3s var(--ease);
    }

    details.step summary:hover { color: var(--text); }

    .next-steps {
      margin-top: 0.75rem;
      padding-top: 0.65rem;
      border-top: 1px solid var(--border);
    }

    .next-label {
      display: block;
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--muted);
      margin-bottom: 0.45rem;
    }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
    }

    .chip {
      padding: 0.4rem 0.7rem;
      border-radius: 999px;
      border: 1px solid rgba(59, 130, 246, 0.35);
      background: rgba(59, 130, 246, 0.1);
      color: #bfdbfe;
      font-size: 0.78rem;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.2s, transform 0.2s var(--ease), border-color 0.2s;
      animation: fadeUp 0.35s var(--ease) both;
    }

    .chip:hover {
      background: rgba(59, 130, 246, 0.22);
      border-color: rgba(59, 130, 246, 0.55);
      transform: translateY(-1px);
    }

    .logo svg { width: 22px; height: 22px; color: white; }

    .typing {
      display: flex;
      align-items: center;
      gap: 0.65rem;
      padding: 0.25rem 0;
      animation: msgIn 0.35s var(--ease) both;
    }

    .typing-dots {
      display: flex;
      gap: 5px;
      padding: 0.85rem 1rem;
      background: var(--assistant-bg);
      border: 1px solid var(--border);
      border-radius: 14px;
      border-top-left-radius: 4px;
    }

    .typing-dots span {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--muted);
      animation: bounce 1.2s ease-in-out infinite;
    }

    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.3s; }

    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.45; }
      30% { transform: translateY(-6px); opacity: 1; }
    }

    .composer {
      padding: 1rem 1.1rem;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 0.65rem;
      align-items: center;
      background: rgba(15, 23, 42, 0.5);
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    .input-wrap input {
      width: 100%;
      padding: 0.85rem 1rem;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: rgba(7, 11, 20, 0.75);
      color: var(--text);
      font: inherit;
      font-size: 0.92rem;
      transition: border-color 0.25s, box-shadow 0.25s;
    }

    .input-wrap input:focus {
      outline: none;
      border-color: rgba(59, 130, 246, 0.55);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.12);
    }

    .input-wrap input::placeholder { color: #64748b; }

    .send-btn {
      width: 46px;
      height: 46px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      background: linear-gradient(135deg, var(--accent), var(--accent-2));
      color: white;
      display: grid;
      place-items: center;
      transition: transform 0.25s var(--ease), box-shadow 0.25s, opacity 0.25s;
      box-shadow: 0 8px 20px var(--accent-glow);
    }

    .send-btn:hover:not(:disabled) {
      transform: translateY(-2px) scale(1.03);
      box-shadow: 0 12px 28px rgba(59, 130, 246, 0.4);
    }

    .send-btn:active:not(:disabled) { transform: scale(0.96); }

    .send-btn:disabled { opacity: 0.45; cursor: not-allowed; }

    .send-btn.loading svg {
      animation: spin 0.9s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (max-width: 860px) {
      body { overflow: auto; }
      .app { height: auto; min-height: 100vh; }
      .layout { grid-template-columns: 1fr; }
      header { flex-direction: column; align-items: flex-start; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
      }
    }
  </style>
</head>
<body>
  <div class="bg-mesh" aria-hidden="true"></div>

  <div class="app">
    <header>
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a4 4 0 0 1 4 4v1h1a3 3 0 0 1 3 3v8a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3V10a3 3 0 0 1 3-3h1V6a4 4 0 0 1 4-4z"/><circle cx="9" cy="13" r="1"/><circle cx="15" cy="13" r="1"/><path d="M9 17h6"/></svg>
        </div>
        <div>
          <h1>AI Research Agent</h1>
          <p>Search → analyze → email — one command</p>
        </div>
      </div>
      <div id="status" class="status-pill">
        <span class="dot"></span>
        <span class="label">Checking API…</span>
      </div>
    </header>

    <div class="layout">
      <aside>
        <div>
          <div class="panel-title">Agent mode</div>
          <select id="mode">
            <option value="search_only">1 · Web search only</option>
            <option value="search_and_code">2 · Search + Python</option>
            <option value="full" selected>3 · Full pipeline (+ email)</option>
          </select>
          <div class="pipeline" id="pipeline">
            <div class="pipeline-step" data-step="1"></div>
            <div class="pipeline-step" data-step="2"></div>
            <div class="pipeline-step" data-step="3"></div>
          </div>
        </div>

        <div>
          <div class="panel-title">Email delivery</div>
          <div class="email-info" id="email-info">Loading recipients…</div>
        </div>

        <div>
          <div class="panel-title">Try an example</div>
          <button type="button" class="btn btn-example" data-prompt="What are the top 3 electric vehicle trends in 2025?">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>
            EV trends search
          </button>
          <button type="button" class="btn btn-example" data-prompt="Search EV market data and use Python to summarize key stats.">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
            Search + analyze
          </button>
          <button type="button" class="btn btn-example" data-prompt="Research the latest trends in electric vehicles, run a quick analysis, and email me a summary">
            <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="m22 6-10 7L2 6"/></svg>
            Full pipeline
          </button>
        </div>

        <button type="button" class="btn btn-clear" id="clear">Clear conversation</button>
      </aside>

      <main>
        <div id="chat">
          <div class="empty-state" id="empty">
            <div class="orb"></div>
            <h2>Ready when you are</h2>
            <p>Ask the agent to research a topic, run Python analysis, or email you a summary.</p>
          </div>
        </div>

        <form class="composer" id="form">
          <div class="input-wrap">
            <input type="text" id="prompt" placeholder="Research EV trends, analyze them, and email me a summary" autocomplete="off" />
          </div>
          <button type="submit" class="send-btn" id="send" aria-label="Send message">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M5 12h14M13 6l6 6-6 6"/>
            </svg>
          </button>
        </form>
      </main>
    </div>
  </div>

  <script>
    const chat = document.getElementById("chat");
    const empty = document.getElementById("empty");
    const form = document.getElementById("form");
    const promptInput = document.getElementById("prompt");
    const modeSelect = document.getElementById("mode");
    const statusEl = document.getElementById("status");
    const sendBtn = document.getElementById("send");
    const pipeline = document.getElementById("pipeline");
    const emailInfo = document.getElementById("email-info");
    let history = [];
    let typingEl = null;

    const ICONS = {
      user: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21a8 8 0 0 0-16 0"/><circle cx="12" cy="7" r="4"/></svg>',
      assistant: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2a4 4 0 0 1 4 4v1h1a3 3 0 0 1 3 3v8a3 3 0 0 1-3 3H7a3 3 0 0 1-3-3V10a3 3 0 0 1 3-3h1V6a4 4 0 0 1 4-4z"/><circle cx="9" cy="13" r="1"/><circle cx="15" cy="13" r="1"/></svg>',
      web_search: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m20 20-3.5-3.5"/></svg>',
      python_repl: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>',
      send_email: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 4h16v16H4z"/><path d="m22 6-10 7L2 6"/></svg>',
      default: '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>',
    };

    function setStatus(text, type = "") {
      statusEl.className = "status-pill" + (type ? " " + type : "");
      statusEl.querySelector(".label").textContent = text;
    }

    function updatePipeline() {
      const mode = modeSelect.value;
      const active = mode === "search_only" ? 1 : mode === "search_and_code" ? 2 : 3;
      pipeline.querySelectorAll(".pipeline-step").forEach((el) => {
        el.classList.toggle("active", Number(el.dataset.step) <= active);
      });
    }

    function hideEmpty() {
      if (empty) empty.style.display = "none";
    }

    function showEmpty() {
      if (empty) empty.style.display = "block";
    }

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function addMessage(role, content, extra = {}) {
      hideEmpty();

      const row = document.createElement("div");
      row.className = `message-row ${role}`;

      if (role !== "system") {
        const avatar = document.createElement("div");
        avatar.className = "avatar";
        avatar.innerHTML = role === "user" ? ICONS.user : ICONS.assistant;
        avatar.setAttribute("aria-hidden", "true");
        row.appendChild(avatar);
      }

      const bubble = document.createElement("div");
      bubble.className = "bubble";
      bubble.textContent = content;

      if (extra.steps && extra.steps.length) {
        const stepsWrap = document.createElement("div");
        stepsWrap.className = "steps";
        extra.steps.forEach((step, i) => {
          const details = document.createElement("details");
          details.className = "step";
          details.style.animationDelay = `${i * 0.08}s`;
          const icon = ICONS[step.tool] || ICONS.default;
          details.innerHTML = `
            <summary><span class="tool-icon">${icon}</span> ${escapeHtml(step.tool)} <span class="chevron">›</span></summary>
            <pre>${escapeHtml(step.input)}\n\n→ ${escapeHtml(step.output.slice(0, 800))}</pre>
          `;
          stepsWrap.appendChild(details);
        });
        bubble.appendChild(stepsWrap);
      }

      if (extra.model_used) {
        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = `model · ${extra.model_used}`;
        bubble.appendChild(meta);
      }

      if (extra.next_steps && extra.next_steps.length) {
        const wrap = document.createElement("div");
        wrap.className = "next-steps";
        wrap.innerHTML = '<span class="next-label">Suggested next step</span>';
        const chips = document.createElement("div");
        chips.className = "chips";
        extra.next_steps.forEach((step, i) => {
          const chip = document.createElement("button");
          chip.type = "button";
          chip.className = "chip";
          chip.textContent = step.label;
          chip.style.animationDelay = `${i * 0.06}s`;
          chip.addEventListener("click", () => {
            if (step.mode) modeSelect.value = step.mode;
            updatePipeline();
            sendPrompt(step.prompt);
          });
          chips.appendChild(chip);
        });
        wrap.appendChild(chips);
        bubble.appendChild(wrap);
      }

      row.appendChild(bubble);
      chat.appendChild(row);
      chat.scrollTop = chat.scrollHeight;
    }

    function showTyping() {
      hideEmpty();
      typingEl = document.createElement("div");
      typingEl.className = "typing";
      typingEl.innerHTML = `
        <div class="avatar" aria-hidden="true">${ICONS.assistant}</div>
        <div class="typing-dots" aria-label="Agent is thinking">
          <span></span><span></span><span></span>
        </div>
      `;
      chat.appendChild(typingEl);
      chat.scrollTop = chat.scrollHeight;
    }

    function hideTyping() {
      if (typingEl) {
        typingEl.remove();
        typingEl = null;
      }
    }

    function parseError(data) {
      const detail = data.detail || data;
      if (typeof detail === "string") return detail;
      if (detail.hint) return `${detail.error || "Error"}\n${detail.hint}`;
      return detail.error || JSON.stringify(detail);
    }

    async function checkHealth() {
      try {
        const res = await fetch("/api/health");
        const data = await res.json();
        if (data.status === "ok") {
          setStatus("API ready", "ok");
          const count = data.email_count || 0;
          const list = (data.email_recipients || []).join(", ");
          emailInfo.innerHTML = count
            ? `<strong>${count} recipient${count > 1 ? "s" : ""}</strong><br>${escapeHtml(list)}`
            : "No email recipients configured.";
        } else {
          setStatus("Missing env vars", "error");
          emailInfo.textContent = "Email not configured.";
        }
      } catch {
        setStatus("API unreachable", "error");
        emailInfo.textContent = "Could not load email settings.";
      }
    }

    async function sendPrompt(text) {
      if (!text.trim()) return;

      addMessage("user", text);
      history.push({ role: "user", content: text });
      sendBtn.disabled = true;
      sendBtn.classList.add("loading");
      setStatus("Agent working…", "working");
      showTyping();

      try {
        const res = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            prompt: text,
            mode: modeSelect.value,
            history: history.slice(0, -1),
          }),
        });
        const data = await res.json();
        hideTyping();
        if (!res.ok) throw new Error(parseError(data));

        const output = data.output || "Task completed.";
        addMessage("assistant", output, {
          steps: data.steps,
          model_used: data.model_used,
          next_steps: data.next_steps,
        });
        history.push({ role: "assistant", content: output });
        setStatus("Done", "ok");
      } catch (err) {
        hideTyping();
        addMessage("system", err.message || "Request failed");
        setStatus("Error", "error");
      } finally {
        sendBtn.disabled = false;
        sendBtn.classList.remove("loading");
        promptInput.value = "";
        promptInput.focus();
      }
    }

    form.addEventListener("submit", (e) => {
      e.preventDefault();
      sendPrompt(promptInput.value);
    });

    document.querySelectorAll("[data-prompt]").forEach((btn) => {
      btn.addEventListener("click", () => sendPrompt(btn.dataset.prompt));
    });

    document.getElementById("clear").addEventListener("click", () => {
      chat.querySelectorAll(".message-row, .typing, .next-steps").forEach((el) => el.remove());
      history = [];
      showEmpty();
      setStatus("Chat cleared", "");
    });

    modeSelect.addEventListener("change", updatePipeline);
    updatePipeline();
    checkHealth();
  </script>
</body>
</html>
